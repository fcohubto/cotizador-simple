<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador Simple</title>
<style>
  :root{
    --bg: #0D0B09;
    --panel: #17140F;
    --border: #2A241C;
    --text: #EDE8DF;
    --text-muted: #9A948C;
    --accent: #C9A15A;
    --danger: #B5544A;
    --radius: 10px;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.5;
  }
  .wrap{
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header{
    margin-bottom: 32px;
  }
  h1{
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 6px;
  }
  header p{
    color: var(--text-muted);
    margin: 0;
    font-size: 14px;
  }
  .card{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .card h2{
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 16px;
  }
  label{
    display:block;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  input[type="text"], input[type="number"]{
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
  }
  input:focus{
    outline: none;
    border-color: var(--accent);
  }
  .field{ margin-bottom: 14px; }
  .ingrediente-row{
    display: grid;
    grid-template-columns: 1fr 90px 110px 32px;
    gap: 8px;
    margin-bottom: 10px;
    align-items: end;
  }
  .ingrediente-row label{ margin-bottom: 4px; }
  .btn{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn:hover{ border-color: var(--accent); }
  .btn-primary{
    background: var(--accent);
    border-color: var(--accent);
    color: #17140F;
    font-weight: 600;
  }
  .btn-primary:hover{ opacity: 0.9; }
  .btn-remove{
    color: var(--danger);
    border: none;
    background: transparent;
    font-size: 18px;
    cursor: pointer;
    padding: 8px;
  }
  .btn-add-ingrediente{
    width: 100%;
    margin-bottom: 16px;
  }
  .resumen{
    border-top: 1px solid var(--border);
    padding-top: 16px;
    margin-top: 16px;
  }
  .resumen-row{
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .resumen-row.final{
    font-size: 18px;
    color: var(--text);
    font-weight: 600;
    margin-top: 8px;
  }
  .acciones{
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .acciones .btn{ flex: 1; }
  .productos-list{
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .producto-item{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .producto-header{
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .producto-nombre{
    font-size: 16px;
    font-weight: 600;
  }
  .producto-precio{
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
  }
  .producto-detalle{
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 6px;
  }
  .producto-actions{
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }
  .empty{
    color: var(--text-muted);
    font-size: 14px;
    text-align: center;
    padding: 20px 0;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Cotizador Simple</h1>
    <p>Calcula el precio final de tus productos según sus ingredientes.</p>
  </header>

  <div class="card">
    <h2>Nuevo producto</h2>
    <div class="field">
      <label for="nombreProducto">Nombre del producto</label>
      <input type="text" id="nombreProducto" placeholder="Ej: Torta de chocolate">
    </div>

    <label>Ingredientes</label>
    <div id="ingredientesContainer"></div>
    <button class="btn btn-add-ingrediente" onclick="agregarFilaIngrediente()">+ Agregar ingrediente</button>

    <div class="field">
      <label for="valorAdicional">Valor adicional (mano de obra, utilidad, etc.)</label>
      <input type="number" id="valorAdicional" placeholder="0" min="0" oninput="actualizarResumen()">
    </div>

    <div class="resumen">
      <div class="resumen-row">
        <span>Costo ingredientes</span>
        <span id="costoIngredientes">$0</span>
      </div>
      <div class="resumen-row">
        <span>Valor adicional</span>
        <span id="valorAdicionalResumen">$0</span>
      </div>
      <div class="resumen-row final">
        <span>Valor final</span>
        <span id="valorFinal">$0</span>
      </div>
    </div>

    <div class="acciones">
      <button class="btn btn-primary" onclick="guardarProducto()">Guardar producto</button>
      <button class="btn" onclick="limpiarFormulario()">Limpiar</button>
    </div>
  </div>

  <div class="card">
    <h2>Mis productos</h2>
    <div id="productosList" class="productos-list">
      <p class="empty">Aún no has guardado productos.</p>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'cotizador-simple-productos';
  let productos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let editandoId = null;

  function agregarFilaIngrediente(nombre = '', cantidad = '', valorUnitario = '') {
    const container = document.getElementById('ingredientesContainer');
    const row = document.createElement('div');
    row.className = 'ingrediente-row';
    row.innerHTML = `
      <div>
        <label>Ingrediente</label>
        <input type="text" class="ing-nombre" value="${nombre}" placeholder="Ej: Harina" oninput="actualizarResumen()">
      </div>
      <div>
        <label>Cantidad</label>
        <input type="number" class="ing-cantidad" value="${cantidad}" min="0" step="any" oninput="actualizarResumen()">
      </div>
      <div>
        <label>Valor unit.</label>
        <input type="number" class="ing-valor" value="${valorUnitario}" min="0" step="any" oninput="actualizarResumen()">
      </div>
      <button class="btn-remove" onclick="this.closest('.ingrediente-row').remove(); actualizarResumen()">×</button>
    `;
    container.appendChild(row);
  }

  function formatoCLP(valor) {
    return '$' + Math.round(valor).toLocaleString('es-CL');
  }

  function leerIngredientes() {
    const filas = document.querySelectorAll('.ingrediente-row');
    return Array.from(filas).map(fila => {
      const nombre = fila.querySelector('.ing-nombre').value.trim();
      const cantidad = parseFloat(fila.querySelector('.ing-cantidad').value) || 0;
      const valorUnitario = parseFloat(fila.querySelector('.ing-valor').value) || 0;
      return { nombre, cantidad, valorUnitario };
    });
  }

  function calcularCostoIngredientes(ingredientes) {
    return ingredientes.reduce((total, ing) => total + (ing.cantidad * ing.valorUnitario), 0);
  }

  function actualizarResumen() {
    const ingredientes = leerIngredientes();
    const costoIngredientes = calcularCostoIngredientes(ingredientes);
    const valorAdicional = parseFloat(document.getElementById('valorAdicional').value) || 0;
    const valorFinal = costoIngredientes + valorAdicional;

    document.getElementById('costoIngredientes').textContent = formatoCLP(costoIngredientes);
    document.getElementById('valorAdicionalResumen').textContent = formatoCLP(valorAdicional);
    document.getElementById('valorFinal').textContent = formatoCLP(valorFinal);
  }

  function guardarProducto() {
    const nombre = document.getElementById('nombreProducto').value.trim();
    if (!nombre) {
      alert('Ingresa el nombre del producto.');
      return;
    }
    const ingredientes = leerIngredientes().filter(ing => ing.nombre);
    const costoIngredientes = calcularCostoIngredientes(ingredientes);
    const valorAdicional = parseFloat(document.getElementById('valorAdicional').value) || 0;
    const valorFinal = costoIngredientes + valorAdicional;

    const producto = {
      id: editandoId || Date.now().toString(),
      nombre,
      ingredientes,
      valorAdicional,
      costoIngredientes,
      valorFinal
    };

    if (editandoId) {
      productos = productos.map(p => p.id === editandoId ? producto : p);
    } else {
      productos.push(producto);
    }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(productos));
    limpiarFormulario();
    renderProductos();
  }

  function limpiarFormulario() {
    document.getElementById('nombreProducto').value = '';
    document.getElementById('valorAdicional').value = '';
    document.getElementById('ingredientesContainer').innerHTML = '';
    agregarFilaIngrediente();
    editandoId = null;
    actualizarResumen();
  }

  function editarProducto(id) {
    const producto = productos.find(p => p.id === id);
    if (!producto) return;
    editandoId = id;
    document.getElementById('nombreProducto').value = producto.nombre;
    document.getElementById('valorAdicional').value = producto.valorAdicional;
    document.getElementById('ingredientesContainer').innerHTML = '';
    producto.ingredientes.forEach(ing => agregarFilaIngrediente(ing.nombre, ing.cantidad, ing.valorUnitario));
    actualizarResumen();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function eliminarProducto(id) {
    if (!confirm('¿Eliminar este producto?')) return;
    productos = productos.filter(p => p.id !== id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(productos));
    renderProductos();
  }

  function renderProductos() {
    const list = document.getElementById('productosList');
    if (productos.length === 0) {
      list.innerHTML = '<p class="empty">Aún no has guardado productos.</p>';
      return;
    }
    list.innerHTML = productos.map(p => `
      <div class="producto-item">
        <div class="producto-header">
          <span class="producto-nombre">${p.nombre}</span>
          <span class="producto-precio">${formatoCLP(p.valorFinal)}</span>
        </div>
        <div class="producto-detalle">
          ${p.ingredientes.length} ingrediente(s) · Costo: ${formatoCLP(p.costoIngredientes)} · Adicional: ${formatoCLP(p.valorAdicional)}
        </div>
        <div class="producto-actions">
          <button class="btn" onclick="editarProducto('${p.id}')">Editar</button>
          <button class="btn" onclick="eliminarProducto('${p.id}')">Eliminar</button>
        </div>
      </div>
    `).join('');
  }

  agregarFilaIngrediente();
  renderProductos();
</script>
</body>
</html>
