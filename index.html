<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cotizador Simple</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F2B84B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cotizador">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
<style>
  :root{
    /* Material 3 — color roles (dark scheme, seed cálido para evitar el azul-negro genérico) */
    --md-primary: #F2B84B;
    --md-on-primary: #402D00;
    --md-primary-container: #5C4300;
    --md-on-primary-container: #FFDDA1;

    --md-secondary-container: #52442C;
    --md-on-secondary-container: #F5DFC0;

    --md-tertiary-container: #33492C;
    --md-on-tertiary-container: #C4E6B3;
    --md-error: #FFB4AB;

    --md-surface: #14120E;
    --md-surface-container-lowest: #0A0908;
    --md-surface-container-low: #1C1912;
    --md-surface-container: #201D16;
    --md-surface-container-high: #2B271E;
    --md-surface-container-highest: #363228;
    --md-on-surface: #EAE1D5;
    --md-on-surface-variant: #CDC5B4;
    --md-outline: #96917F;
    --md-outline-variant: #4B4739;

    /* Shape scale */
    --shape-xs: 4px;
    --shape-sm: 8px;
    --shape-md: 12px;
    --shape-lg: 16px;
    --shape-xl: 28px;
    --shape-full: 999px;

    /* Espaciado — escala 8dp (Material) sobre grilla de 4px */
    --sp-1: 4px;
    --sp-2: 8px;
    --sp-3: 12px;
    --sp-4: 16px;
    --sp-5: 24px;

    /* Tipografía — mínimo 14px visible en pantalla */
    --text-base: 0.875rem;
    --text-md: 1rem;
    --text-lg: 1.125rem;
    --text-xl: 1.5rem;
    --text-2xl: 1.75rem;
    --text-3xl: 2.25rem;

    --motion-fast: 150ms;
    --motion-base: 250ms;
    --motion-easing: cubic-bezier(0.2, 0, 0, 1);

    --nav-height: 64px;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--md-surface);
    color: var(--md-on-surface);
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 16px;
    line-height: 1.5;
  }
  .material-symbols-outlined{
    font-variation-settings: 'opsz' 24, 'wght' 400, 'FILL' 0, 'GRAD' 0;
    font-size: 22px;
    line-height: 1;
  }
  .app{
    max-width: 720px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) var(--sp-5) calc(var(--nav-height) + env(safe-area-inset-bottom) + 96px);
  }
  .top-app-bar{
    padding: var(--sp-5) 0 var(--sp-3);
  }
  .top-app-bar h1{
    font-size: var(--text-2xl);
    font-weight: 700;
    margin: 0 0 4px;
  }
  .top-app-bar p{
    color: var(--md-on-surface-variant);
    margin: 0;
    font-size: var(--text-md);
  }
  .view{ display: none; }
  .view.active{ display: block; }
  .view-header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--sp-3);
    margin-bottom: var(--sp-5);
  }
  .view-header h2{
    font-size: var(--text-xl);
    font-weight: 700;
    margin: 0;
  }
  .btn-header-add{
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    border: none;
    border-radius: var(--shape-full);
    background: var(--md-primary-container);
    color: var(--md-on-primary-container);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background var(--motion-fast) var(--motion-easing), color var(--motion-fast) var(--motion-easing), transform var(--motion-fast) var(--motion-easing);
  }
  .btn-header-add:hover{ background: var(--md-primary); color: var(--md-on-primary); }
  .btn-header-add:active{ transform: scale(0.94); }
  .btn-header-add .material-symbols-outlined{ font-size: 24px; }
  .card{
    background: var(--md-surface-container);
    border-radius: var(--shape-lg);
    padding: var(--sp-5);
    margin-bottom: var(--sp-4);
  }
  .card h3{
    font-size: var(--text-xl);
    font-weight: 700;
    margin: 0 0 var(--sp-5);
  }
  label{
    display:block;
    font-size: var(--text-base);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--md-on-surface-variant);
    margin-bottom: var(--sp-1);
  }
  .section-label{
    display: block;
    font-size: var(--text-md);
    font-weight: 700;
    text-transform: none;
    letter-spacing: normal;
    color: var(--md-on-surface);
    margin: 0 0 var(--sp-3);
  }
  .ing-row-header{
    display: grid;
    grid-template-columns: 1fr 110px 90px 44px;
    gap: var(--sp-2);
    font-size: var(--text-base);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--md-on-surface-variant);
    margin-bottom: var(--sp-2);
  }
  @media (max-width: 480px){
    .ing-row-header{ display: none; }
  }
  .badge{
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--md-tertiary-container);
    color: var(--md-on-tertiary-container);
    border-radius: var(--shape-full);
    padding: var(--sp-1) var(--sp-3);
    font-size: var(--text-base);
    font-weight: 600;
    white-space: nowrap;
  }
  .item-meta{
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: var(--sp-2);
    margin-top: var(--sp-2);
  }
  .item-adicional{
    font-size: var(--text-base);
    color: var(--md-on-surface-variant);
  }
  input[type="text"], input[type="number"], select{
    width: 100%;
    background: var(--md-surface-container-highest);
    border: none;
    border-bottom: 1px solid var(--md-outline);
    border-radius: var(--shape-xs) var(--shape-xs) 0 0;
    color: var(--md-on-surface);
    padding: var(--sp-3) var(--sp-4);
    font-size: var(--text-md);
    font-family: inherit;
    min-height: 44px;
    transition: border-color var(--motion-fast) var(--motion-easing), background var(--motion-fast) var(--motion-easing);
  }
  input:focus, select:focus{
    outline: none;
    border-bottom: 2px solid var(--md-primary);
    background: var(--md-surface-container-high);
    padding-bottom: calc(var(--sp-3) - 1px);
  }
  .field{ margin-bottom: var(--sp-4); }
  .btn{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    background: var(--md-surface-container-high);
    color: var(--md-on-surface);
    border-radius: var(--shape-full);
    padding: var(--sp-2) var(--sp-5);
    font-size: var(--text-base);
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    min-height: 44px;
    transition: background var(--motion-fast) var(--motion-easing), transform var(--motion-fast) var(--motion-easing);
  }
  .btn:hover{ background: var(--md-surface-container-highest); }
  .btn:active{ transform: scale(0.97); }
  .btn-primary{
    background: var(--md-primary);
    color: var(--md-on-primary);
    font-weight: 600;
  }
  .btn-primary:hover{ opacity: 0.92; }
  .btn-tonal{
    background: var(--md-secondary-container);
    color: var(--md-on-secondary-container);
  }
  .btn-text{
    background: transparent;
    color: var(--md-primary);
  }
  .btn-text:hover{ background: rgba(242, 184, 75, 0.1); }
  .btn-text-danger{
    background: transparent;
    color: var(--md-error);
  }
  .btn-text-danger:hover{ background: rgba(255, 180, 171, 0.1); }
  .btn-remove{
    color: var(--md-on-surface-variant);
    border: none;
    background: transparent;
    cursor: pointer;
    width: 44px;
    height: 44px;
    border-radius: var(--shape-full);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--motion-fast) var(--motion-easing), color var(--motion-fast) var(--motion-easing);
  }
  .btn-remove:hover{ background: var(--md-surface-container-highest); color: var(--md-error); }
  .btn-add-row{
    width: 100%;
    margin: var(--sp-4) 0 var(--sp-5);
  }
  .receta-ing-row{
    display: grid;
    grid-template-columns: 1fr 110px 90px 44px;
    gap: var(--sp-2);
    margin-bottom: var(--sp-3);
    align-items: center;
  }
  .subtotal-display{
    font-size: var(--text-base);
    color: var(--md-on-surface-variant);
    padding: var(--sp-3) 0;
  }
  .cantidad-wrap{ position: relative; }
  .cantidad-wrap input{ padding-right: 36px; }
  .cantidad-unidad{
    position: absolute;
    right: var(--sp-2);
    top: 50%;
    transform: translateY(-50%);
    font-size: var(--text-base);
    color: var(--md-on-surface-variant);
    pointer-events: none;
  }
  @media (max-width: 480px){
    .receta-ing-row{
      grid-template-columns: 1fr 1fr 44px;
      grid-template-areas: "select select remove" "cantidad subtotal remove";
      row-gap: var(--sp-2);
    }
    .rec-ing-select{ grid-area: select; }
    .rec-ing-cantidad{ grid-area: cantidad; }
    .rec-ing-subtotal{ grid-area: subtotal; align-self: center; }
    .btn-remove{ grid-area: remove; align-self: center; justify-self: center; }
  }
  .resumen{
    border-top: 1px solid var(--md-outline-variant);
    padding-top: var(--sp-4);
    margin-top: var(--sp-4);
  }
  .resumen-row{
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--text-md);
    color: var(--md-on-surface-variant);
    margin-bottom: var(--sp-2);
  }
  .resumen-row.final{
    font-size: var(--text-3xl);
    color: var(--md-primary);
    font-weight: 700;
    margin-top: var(--sp-3);
  }
  .acciones{
    display: flex;
    gap: var(--sp-3);
    margin-top: var(--sp-5);
  }
  .acciones .btn{ flex: 1; }
  .list{
    display: flex;
    flex-direction: column;
    gap: var(--sp-2);
  }
  .list-item{
    display: flex;
    align-items: center;
    width: 100%;
    gap: var(--sp-4);
    background: var(--md-surface-container);
    border: none;
    border-radius: var(--shape-lg);
    padding: var(--sp-3) var(--sp-4);
    font: inherit;
    text-align: left;
    color: inherit;
    cursor: pointer;
    transition: background var(--motion-fast) var(--motion-easing);
  }
  .list-item:hover{ background: var(--md-surface-container-high); }
  .list-item:active{ background: var(--md-surface-container-highest); }
  .list-icon{
    width: 40px;
    height: 40px;
    border-radius: var(--shape-md);
    background: var(--md-secondary-container);
    color: var(--md-on-secondary-container);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
    line-height: 1;
  }
  .list-body{ flex: 1; min-width: 0; }
  .list-chevron{
    flex-shrink: 0;
    color: var(--md-on-surface-variant);
    font-size: 20px;
  }
  .metric-strip-group{
    display: flex;
    flex-direction: column;
    gap: var(--sp-3);
    background: var(--md-surface-container);
    border-radius: var(--shape-lg);
    padding: var(--sp-5);
    margin-bottom: var(--sp-5);
  }
  .metric-strip{
    display: flex;
    align-items: baseline;
    gap: var(--sp-3);
    padding-bottom: var(--sp-3);
    border-bottom: 1px solid var(--md-outline-variant);
  }
  .metric-strip:last-child{ border-bottom: none; padding-bottom: 0; }
  .metric-value{
    font-size: var(--text-3xl);
    font-weight: 700;
    color: var(--md-primary);
    line-height: 1;
  }
  .metric-label{
    font-size: var(--text-base);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--md-on-surface-variant);
  }
  .item-header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--sp-3);
  }
  .item-nombre{
    font-size: var(--text-lg);
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-valor{
    font-size: var(--text-xl);
    font-weight: 700;
    color: var(--md-primary);
    white-space: nowrap;
  }
  .item-detalle{
    color: var(--md-on-surface-variant);
    font-size: var(--text-base);
    margin-top: 4px;
  }
  .item-warning{
    color: var(--md-error);
    font-size: var(--text-base);
    margin-top: 4px;
  }
  .empty{
    color: var(--md-on-surface-variant);
    font-size: var(--text-base);
    text-align: center;
    padding: var(--sp-5) 0;
  }
  .empty-block{
    text-align: center;
    padding: var(--sp-5) 0;
  }
  .empty-block p{
    color: var(--md-on-surface-variant);
    font-size: var(--text-base);
    margin: 0 0 var(--sp-4);
  }
  .onboarding-intro{
    font-size: var(--text-md);
    color: var(--md-on-surface-variant);
    margin: 0 0 var(--sp-5);
  }
  .onboarding-step{
    display: flex;
    align-items: flex-start;
    gap: var(--sp-4);
    padding-bottom: var(--sp-4);
    margin-bottom: var(--sp-4);
    border-bottom: 1px solid var(--md-outline-variant);
  }
  .onboarding-step:last-of-type{ border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .onboarding-step-number{
    flex-shrink: 0;
    min-width: 1.1em;
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--md-primary);
    line-height: 1;
  }
  .onboarding-step-text{
    font-size: var(--text-base);
    color: var(--md-on-surface);
  }
  .onboarding-cta{
    width: 100%;
    margin-top: var(--sp-5);
  }
  .nav-bar{
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    padding-bottom: env(safe-area-inset-bottom);
    background: var(--md-surface-container);
    border-top: 1px solid var(--md-outline-variant);
    z-index: 10;
  }
  .nav-bar-inner{
    max-width: 720px;
    margin: 0 auto;
    height: var(--nav-height);
    display: flex;
  }
  .nav-item{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: var(--md-on-surface-variant);
    padding: var(--sp-2) 0;
  }
  .nav-indicator{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: var(--sp-1) var(--sp-3);
    border-radius: var(--shape-lg);
    transition: background var(--motion-base) var(--motion-easing);
  }
  .nav-item.active .nav-indicator{ background: var(--md-secondary-container); }
  .nav-item.active .nav-indicator .material-symbols-outlined{ color: var(--md-on-secondary-container); }
  .nav-item.active .nav-indicator .nav-label{ color: var(--md-on-secondary-container); font-weight: 700; }
  .nav-item .material-symbols-outlined{ font-size: 22px; }
  .nav-label{
    font-size: var(--text-base);
    font-weight: 500;
  }
  .nav-item.active .nav-label{ font-weight: 700; }
  .access-gate{
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--md-surface);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--sp-5);
    z-index: 100;
  }
  .access-gate-card{
    width: 100%;
    max-width: 360px;
    background: var(--md-surface-container);
    border-radius: var(--shape-lg);
    padding: var(--sp-5);
  }
  .access-gate-card h2{
    font-size: var(--text-xl);
    font-weight: 700;
    margin: 0 0 var(--sp-2);
  }
  .access-gate-card > p{
    color: var(--md-on-surface-variant);
    font-size: var(--text-base);
    margin: 0 0 var(--sp-5);
  }
</style>
</head>
<body>
<div id="accessGate" class="access-gate">
  <div class="access-gate-card">
    <h2>Acceso privado</h2>
    <p>Ingresa la contraseña para continuar.</p>
    <form onsubmit="event.preventDefault(); verificarAcceso();">
      <div class="field">
        <label for="gatePassword">Contraseña</label>
        <input type="password" id="gatePassword" placeholder="••••••••" autocomplete="off">
      </div>
      <p id="gateError" class="item-warning" style="display:none;">Contraseña incorrecta.</p>
      <button type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
    </form>
  </div>
</div>

<div id="appContent" style="display:none;">
<div class="app">
  <header class="top-app-bar">
    <h1>Cotizador Simple</h1>
    <p>Arma tus recetas y cotiza tus productos.</p>
  </header>

  <main>
    <!-- VISTA: INICIO -->
    <div id="view-inicio" class="view active">
      <div class="view-header"><h2>Inicio</h2></div>
      <div id="inicioContent"></div>
    </div>

    <!-- VISTA: PRODUCTOS -->
    <div id="view-productos" class="view">
      <div class="view-header">
        <h2>Mis productos</h2>
        <button class="btn-header-add" id="addBtnProductos" aria-label="Agregar producto" onclick="mostrarFormProducto()">
          <span class="material-symbols-outlined">add</span>
        </button>
      </div>
      <div id="productosContent"></div>
    </div>

    <!-- VISTA: RECETAS -->
    <div id="view-recetas" class="view">
      <div class="view-header">
        <h2>Mis recetas</h2>
        <button class="btn-header-add" id="addBtnRecetas" aria-label="Agregar receta" onclick="mostrarFormReceta()">
          <span class="material-symbols-outlined">add</span>
        </button>
      </div>
      <div id="recetasContent"></div>
    </div>

    <!-- VISTA: INGREDIENTES -->
    <div id="view-ingredientes" class="view">
      <div class="view-header">
        <h2>Ingredientes</h2>
        <button class="btn-header-add" id="addBtnIngredientes" aria-label="Agregar ingrediente" onclick="mostrarFormIngrediente()">
          <span class="material-symbols-outlined">add</span>
        </button>
      </div>
      <div id="ingredientesContent"></div>
    </div>
  </main>
</div>

<nav class="nav-bar">
  <div class="nav-bar-inner">
    <button class="nav-item active" data-view="inicio" onclick="cambiarVista('inicio')">
      <span class="nav-indicator">
        <span class="material-symbols-outlined">home</span>
        <span class="nav-label">Inicio</span>
      </span>
    </button>
    <button class="nav-item" data-view="productos" onclick="cambiarVista('productos')">
      <span class="nav-indicator">
        <span class="material-symbols-outlined">receipt_long</span>
        <span class="nav-label">Productos</span>
      </span>
    </button>
    <button class="nav-item" data-view="recetas" onclick="cambiarVista('recetas')">
      <span class="nav-indicator">
        <span class="material-symbols-outlined">menu_book</span>
        <span class="nav-label">Recetas</span>
      </span>
    </button>
    <button class="nav-item" data-view="ingredientes" onclick="cambiarVista('ingredientes')">
      <span class="nav-indicator">
        <span class="material-symbols-outlined">inventory_2</span>
        <span class="nav-label">Ingredientes</span>
      </span>
    </button>
  </div>
</nav>
</div>

<script>
  /* ---------- Storage ---------- */
  const KEY_ING = 'cotizador-simple-ingredientes';
  const KEY_REC = 'cotizador-simple-recetas';
  const KEY_PROD = 'cotizador-simple-productos';

  let ingredientes = JSON.parse(localStorage.getItem(KEY_ING) || '[]');
  let recetas = JSON.parse(localStorage.getItem(KEY_REC) || '[]');
  let productos = JSON.parse(localStorage.getItem(KEY_PROD) || '[]');

  function guardarIngredientes(){ localStorage.setItem(KEY_ING, JSON.stringify(ingredientes)); }
  function guardarRecetas(){ localStorage.setItem(KEY_REC, JSON.stringify(recetas)); }
  function guardarProductos(){ localStorage.setItem(KEY_PROD, JSON.stringify(productos)); }

  /* ---------- Migración de datos antiguos (modelo de un solo nivel) ---------- */
  function migrarDatosAntiguos(){
    const tieneFormaVieja = productos.length > 0 && productos[0].recetaId === undefined;
    if (!tieneFormaVieja) return;

    const productosViejos = productos;
    ingredientes = [];
    recetas = [];
    productos = [];

    productosViejos.forEach(pv => {
      const ingredientesReceta = (pv.ingredientes || []).map(ing => {
        let existente = ingredientes.find(i => i.nombre.toLowerCase() === ing.nombre.toLowerCase());
        if (!existente) {
          existente = { id: generarId(), nombre: ing.nombre, valorUnitario: ing.valorUnitario || 0, unidad: 'unidad' };
          ingredientes.push(existente);
        }
        return { ingredienteId: existente.id, cantidad: ing.cantidad || 0 };
      });
      const receta = { id: generarId(), nombre: pv.nombre, ingredientes: ingredientesReceta };
      recetas.push(receta);
      productos.push({ id: generarId(), nombre: pv.nombre, recetaId: receta.id, valorAdicional: pv.valorAdicional || 0 });
    });

    guardarIngredientes();
    guardarRecetas();
    guardarProductos();
  }

  function migrarUnidadesIngredientes(){
    let cambio = false;
    ingredientes.forEach(ing => {
      if (!ing.unidad){ ing.unidad = 'unidad'; cambio = true; }
    });
    if (cambio) guardarIngredientes();
  }

  /* ---------- Helpers ---------- */
  function generarId(){ return Date.now().toString() + Math.random().toString(36).slice(2, 7); }

  function formatoCLP(valor){ return '$' + Math.round(valor).toLocaleString('es-CL'); }

  function getIngrediente(id){ return ingredientes.find(i => i.id === id); }
  function getReceta(id){ return recetas.find(r => r.id === id); }

  const EMOJI_INGREDIENTES = [
    [['harina'], '🌾'],
    [['azucar', 'azúcar'], '🍬'],
    [['huevo'], '🥚'],
    [['mantequilla'], '🧈'],
    [['leche'], '🥛'],
    [['chocolate', 'cacao'], '🍫'],
    [['vainilla'], '🌼'],
    [['sal'], '🧂'],
    [['aceite'], '🫒'],
    [['levadura', 'polvo de hornear', 'polvo hornear'], '🍞'],
    [['limon', 'limón'], '🍋'],
    [['naranja'], '🍊'],
    [['fresa'], '🍓'],
    [['coco'], '🥥'],
    [['nuez', 'nueces', 'almendra'], '🥜'],
    [['miel'], '🍯'],
    [['crema'], '🍦'],
    [['canela'], '🟤']
  ];
  const EMOJI_PREPARACIONES = [
    [['torta', 'queque', 'pastel', 'cake'], '🎂'],
    [['cupcake', 'magdalena', 'muffin'], '🧁'],
    [['galleta', 'cookie'], '🍪'],
    [['brownie'], '🍫'],
    [['tarta', 'pie'], '🥧'],
    [['pan', 'baguette'], '🍞'],
    [['empanada'], '🥟'],
    [['helado'], '🍨'],
    [['pizza'], '🍕'],
    [['dona', 'donut'], '🍩']
  ];
  function buscarEmoji(nombre, listas){
    const n = nombre.toLowerCase();
    for (const lista of listas){
      const match = lista.find(([claves]) => claves.some(c => n.includes(c)));
      if (match) return match[1];
    }
    return null;
  }
  function emojiIngrediente(nombre){
    return buscarEmoji(nombre, [EMOJI_INGREDIENTES]) || '🥄';
  }
  function emojiPreparacion(nombre){
    return buscarEmoji(nombre, [EMOJI_PREPARACIONES, EMOJI_INGREDIENTES]) || '🍽️';
  }

  const UNIDADES = [
    { value: 'unidad', abrev: 'un', label: 'Unidad' },
    { value: 'kg', abrev: 'kg', label: 'Kilogramo' },
    { value: 'g', abrev: 'g', label: 'Gramo' },
    { value: 'L', abrev: 'L', label: 'Litro' },
    { value: 'ml', abrev: 'ml', label: 'Mililitro' },
    { value: 'docena', abrev: 'doc', label: 'Docena' }
  ];
  function getUnidad(value){ return UNIDADES.find(u => u.value === value) || UNIDADES[0]; }
  function opcionesUnidadesHTML(seleccionada){
    return UNIDADES.map(u => `<option value="${u.value}" ${u.value === seleccionada ? 'selected' : ''}>${u.label}</option>`).join('');
  }

  function costoReceta(receta){
    if (!receta) return 0;
    return receta.ingredientes.reduce((total, item) => {
      const ing = getIngrediente(item.ingredienteId);
      return total + (ing ? item.cantidad * ing.valorUnitario : 0);
    }, 0);
  }

  function precioFinalProducto(producto){
    const receta = getReceta(producto.recetaId);
    return costoReceta(receta) + (producto.valorAdicional || 0);
  }

    if (vista === 'productos') renderProductosList();

      ? `Este ingrediente se usa en ${usosEnRecetas.length} receta(s). Si lo eliminas, esas recetas quedarán con un ingrediente faltante. ¿Eliminar de todas formas?`
      : '¿Eliminar este ingrediente?';

    ingredientes = ingredientes.filter(i => i.id !== id);
    recetas.forEach(r => { r.ingredientes = r.ingredientes.filter(i => i.ingredienteId !== id); });

  /* ---------- Acceso (barrera liviana, no es seguridad real) ---------- */
  const GATE_HASH = '7416412290f8f691d76c71a5d59729d2b2593de7a51f825724079ed9047f84da';
  const GATE_KEY = 'cotizador-simple-acceso';

  async function sha256Hex(texto){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(texto));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function desbloquear(){
    document.getElementById('accessGate').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    initApp();
  }

  async function verificarAcceso(){
    const valor = document.getElementById('gatePassword').value;
    const hash = await sha256Hex(valor);
    if (hash === GATE_HASH){
      localStorage.setItem(GATE_KEY, '1');
      desbloquear();
    } else {
      document.getElementById('gateError').style.display = 'block';
    }
  }

  if (localStorage.getItem(GATE_KEY) === '1'){
    desbloquear();
  }
</script>
</body>
</html>
